name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: paintbull-web

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore CARWorshoNew.slnx
      - run: dotnet build CARWorshoNew.slnx --configuration Release --no-restore
      # xUnit v3 uses Microsoft Testing Platform — run the test exes directly.
      - run: dotnet run --project tests/Workshop.Domain.Tests --configuration Release --no-build
      - run: dotnet run --project tests/Workshop.Application.Tests --configuration Release --no-build

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Diagnostic: temporarily disable BuildKit cache and force a fresh
          # pull of the SDK / runtime base images. We suspect a stale GHA-cached
          # layer is holding an older `sdk:10.0.203` (with the static-asset
          # publishing regression) and producing a manifest without
          # _framework/* routes. Re-enable below once the build is green by
          # bumping a scoped cache key (e.g. scope=sdk-10.0.203-v2).
          no-cache: true
          pull: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Web App container image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp config container set \
              -g "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              -n "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --container-image-name "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}" \
              --container-registry-url "https://${{ secrets.ACR_LOGIN_SERVER }}" \
              --container-registry-user "${{ secrets.ACR_USERNAME }}" \
              --container-registry-password "${{ secrets.ACR_PASSWORD }}"

            az webapp restart \
              -g "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              -n "${{ secrets.AZURE_WEBAPP_NAME }}"

      - name: Smoke test
        run: |
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health/ready || true)
            echo "attempt $i → $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "Health check never returned 200" && exit 1
